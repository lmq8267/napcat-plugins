<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>离线通知 · 配置</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{colors:{p:'#60A5FA',pd:'#3B82F6'}}}}</script>
<style>
*{margin:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:system-ui,-apple-system,sans-serif}
.glass{background:rgba(255,255,255,.85);backdrop-filter:blur(16px);border-radius:14px;border:1px solid rgba(96,165,250,.12);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.dark .glass{background:rgba(15,23,42,.75);border-color:rgba(96,165,250,.08)}
.sb{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;color:#64748b;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;user-select:none}
.dark .sb{color:#94a3b8}
.sb:hover{background:rgba(96,165,250,.08);color:#3B82F6}
.sb.active{background:linear-gradient(135deg,#60A5FA,#3B82F6);color:#fff;box-shadow:0 2px 10px rgba(59,130,246,.35)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:7px 16px;border-radius:9px;font-weight:500;cursor:pointer;border:none;gap:6px;font-size:13px;transition:all .2s}
.btn:active{transform:scale(.96)}
.btn-p{background:linear-gradient(135deg,#60A5FA,#3B82F6);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.25)}
.btn-p:hover{box-shadow:0 4px 14px rgba(59,130,246,.35)}
.btn-s{background:rgba(96,165,250,.1);color:#3B82F6;border:1px solid rgba(96,165,250,.2)}
.dark .btn-s{color:#93C5FD;border-color:rgba(96,165,250,.15)}
.btn-s:hover{background:rgba(96,165,250,.18)}
.ipt{width:100%;padding:8px 12px;border-radius:9px;border:1px solid rgba(96,165,250,.18);background:rgba(255,255,255,.9);font-size:13px;color:#1e293b}
.dark .ipt{background:rgba(15,23,42,.6);border-color:rgba(96,165,250,.12);color:#e2e8f0}
.ipt:focus{outline:none;border-color:#60A5FA;box-shadow:0 0 0 3px rgba(96,165,250,.15)}
.tgl{position:relative;width:40px;height:22px;background:#cbd5e1;border-radius:11px;cursor:pointer;transition:background .25s}
.dark .tgl{background:#334155}
.tgl.on{background:linear-gradient(135deg,#60A5FA,#3B82F6)}
.tgl::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .25s;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.tgl.on::after{transform:translateX(18px)}
.pg{display:none}
.pg.active{display:block}
.toast-c{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{padding:12px 24px;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);display:flex;align-items:center;gap:8px;animation:si .3s ease;font-size:14px;font-weight:500;min-width:200px;justify-content:center}
.toast.success{background:#10b981;color:#fff;border:1px solid #059669}
.toast.error{background:#ef4444;color:#fff;border:1px solid #dc2626}
.toast.info{background:#3b82f6;color:#fff;border:1px solid #2563eb}
@keyframes si{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.log-c{background:#0c1222;border-radius:10px;padding:12px;max-height:480px;overflow-y:auto;font-family:monospace;font-size:11px;line-height:1.6}
.log-e{padding:1px 0;white-space:pre-wrap;word-break:break-all}
.log-e .lt{color:#475569}
.log-e.log-info .ll{color:#60a5fa}
.log-e.log-warn .ll{color:#fbbf24}
.log-e.log-error .ll{color:#f87171}
.log-e .lm{color:#e2e8f0}
</style>
</head>
<body class="bg-blue-50 dark:bg-slate-900 text-gray-800 dark:text-gray-200">
<div id="tc" class="toast-c"></div>
<div class="flex h-screen">
<aside class="w-48 bg-white dark:bg-slate-800 border-r border-gray-200 dark:border-gray-700 flex flex-col">
<div class="p-4 border-b border-gray-200 dark:border-gray-700">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-gradient-to-br from-blue-400 to-blue-600 rounded-lg flex items-center justify-center text-white text-lg">🔔</div>
<div class="flex-1"><div class="font-bold text-sm">离线通知</div><div class="text-xs text-gray-400" id="ver">v1.0.0</div></div>
<a href="https://github.com/lmq8267/napcat-plugins" target="_blank" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors" title="GitHub">
<svg class="w-5 h-5" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
</a>
</div>
</div>
<nav class="flex-1 p-2 overflow-y-auto">
<div class="sb active" onclick="go('dashboard',this)">📊 仪表盘</div>
<div class="sb" onclick="go('config',this)">⚙️ 配置</div>
<div class="sb" onclick="go('logs',this)">📝 日志</div>
</nav>
<div class="p-3 border-t border-gray-200 dark:border-gray-700">
<button onclick="toggleTheme()" class="text-xs text-gray-400 hover:text-blue-500">🌓 切换主题</button>
</div>
</aside>
<div class="flex-1 flex flex-col overflow-hidden">
<header class="bg-white/80 dark:bg-slate-800/80 backdrop-blur border-b border-gray-200 dark:border-gray-700 px-5 py-3 flex justify-end items-center gap-3">
<button onclick="doSave()" class="btn btn-p">💾 保存</button>
<div class="flex items-center gap-2 px-3 py-1.5 bg-gray-100 dark:bg-slate-700 rounded-full">
<div id="sDot" class="w-2 h-2 rounded-full bg-red-400"></div>
<span class="text-xs font-medium" id="sTxt">加载中</span>
</div>
</header>
<main class="flex-1 overflow-y-auto p-5">

<div id="pg-dashboard" class="pg active">
<div class="glass p-5 mb-4">
<div class="flex items-center gap-3 mb-4">
<div class="w-10 h-10 bg-gradient-to-br from-blue-400 to-blue-600 rounded-xl text-white text-xl flex items-center justify-center">🔔</div>
<div><h3 class="font-bold text-lg">离线通知</h3><p class="text-xs text-gray-400">监控帐号离线状态</p></div>
</div>
<div class="grid grid-cols-2 md:grid-cols-4 gap-3">
<div class="text-center p-3 rounded-lg bg-blue-50 dark:bg-blue-950/30"><div class="text-xl font-bold text-blue-500" id="d-status">-</div><div class="text-xs text-gray-500 mt-1">帐号状态</div></div>
<div class="text-center p-3 rounded-lg bg-emerald-50 dark:bg-emerald-950/30"><div class="text-xl font-bold text-emerald-500" id="d-online">-</div><div class="text-xs text-gray-500 mt-1">上线时间</div></div>
<div class="text-center p-3 rounded-lg bg-violet-50 dark:bg-violet-950/30"><div class="text-xl font-bold text-violet-500" id="d-notify">-</div><div class="text-xs text-gray-500 mt-1">上次通知</div></div>
<div class="text-center p-3 rounded-lg bg-amber-50 dark:bg-amber-950/30"><div class="text-xl font-bold text-amber-500" id="d-next">-</div><div class="text-xs text-gray-500 mt-1">下次检测</div></div>
</div>
</div>
<div class="glass p-5 mb-4">
<div class="text-xs font-semibold text-blue-500 uppercase mb-3">检测方式</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-2">
<div class="p-2 rounded-lg bg-gray-50 dark:bg-slate-800/50 text-xs" id="d-m1">-</div>
<div class="p-2 rounded-lg bg-gray-50 dark:bg-slate-800/50 text-xs" id="d-m2">-</div>
<div class="p-2 rounded-lg bg-gray-50 dark:bg-slate-800/50 text-xs" id="d-m3">-</div>
</div>
</div>
<div class="glass p-5">
<div class="flex gap-2 flex-wrap">
<button onclick="testNotify()" class="btn btn-p">🧪 测试通知</button>
<button id="checkBtn" onclick="doCheck()" class="btn btn-s">🔍 立即检测</button>
</div>
</div>
</div>

<div id="pg-config" class="pg">
<div class="glass p-5 mb-4">
<div class="text-xs font-semibold text-blue-500 uppercase mb-3">基础配置</div>
<div class="flex items-center justify-between py-3 border-b border-gray-100 dark:border-gray-700">
<div><div class="text-sm font-medium">启用监控</div><div class="text-xs text-gray-400">开启后将监控帐号状态</div></div>
<div class="tgl" id="c-enabled" onclick="tg(this)"></div>
</div>
<div class="py-3">
<label class="text-xs text-gray-500 block mb-2">企业微信机器人 Webhook URL</label>
<input type="password" id="c-webhook" class="ipt" placeholder="https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=..." onfocus="this.type='text'" onblur="this.type='password'">
</div>
</div>
<div class="glass p-5 mb-4">
<div class="text-xs font-semibold text-blue-500 uppercase mb-3">检测方式（多选）</div>
<div class="space-y-2">
<label class="flex items-center gap-2 p-2 rounded-lg bg-gray-50 dark:bg-slate-800/50 cursor-pointer hover:bg-gray-100 dark:hover:bg-slate-800">
<input type="checkbox" id="c-m1" value="kickedOffLine" class="w-4 h-4">
<span class="text-sm">监听 KickedOffLine 事件</span>
</label>
<label class="flex items-center gap-2 p-2 rounded-lg bg-gray-50 dark:bg-slate-800/50 cursor-pointer hover:bg-gray-100 dark:hover:bg-slate-800">
<input type="checkbox" id="c-m2" value="getGroupList" class="w-4 h-4">
<span class="text-sm">获取群列表</span>
</label>
<label class="flex items-center gap-2 p-2 rounded-lg bg-gray-50 dark:bg-slate-800/50 cursor-pointer hover:bg-gray-100 dark:hover:bg-slate-800">
<input type="checkbox" id="c-m3" value="getRecentContact" class="w-4 h-4">
<span class="text-sm">获取好友列表</span>
</label>
</div>
</div>
<div class="glass p-5 mb-4">
<div class="grid grid-cols-2 gap-3">
<div><label class="text-xs text-gray-500 block mb-2">检测间隔（分钟）</label><input type="number" id="c-interval" class="ipt" value="5" min="1"></div>
<div><label class="text-xs text-gray-500 block mb-2">重试次数</label><input type="number" id="c-retry" class="ipt" value="2" min="0"></div>
</div>
</div>
<div class="glass p-5">
<div class="text-xs font-semibold text-blue-500 uppercase mb-2">自定义推送内容模板</div>
<p class="text-xs text-gray-400 mb-2">支持变量：{time} 下线时间，{reason} 下线原因</p>
<textarea id="c-msg" class="ipt" rows="4" placeholder="【NapCat-离线通知】&#10;&#10;下线原因：{reason}&#10;&#10;下线时间：{time}"></textarea>
</div>
</div>

<div id="pg-logs" class="pg">
<div class="glass p-5">
<div class="flex items-center justify-between mb-3">
<div><h3 class="font-bold">运行日志</h3><p class="text-xs text-gray-400">查看插件运行日志</p></div>
<div class="flex gap-2"><button onclick="loadLogs()" class="btn btn-p">🔄 刷新</button><button onclick="clrLogs()" class="btn btn-s">🗑️ 清除</button></div>
</div>
<div class="flex gap-2 mb-2">
<button class="text-xs px-3 py-1 rounded-lg border transition-all" style="border-color:rgba(96,165,250,.2);background:linear-gradient(135deg,#60A5FA,#3B82F6);color:#fff" onclick="fltLog('all',this)">全部</button>
<button class="text-xs px-3 py-1 rounded-lg border transition-all" style="border-color:rgba(96,165,250,.2);background:rgba(96,165,250,.1);color:#3B82F6" onclick="fltLog('info',this)">INFO</button>
<button class="text-xs px-3 py-1 rounded-lg border transition-all" style="border-color:rgba(96,165,250,.2);background:rgba(96,165,250,.1);color:#3B82F6" onclick="fltLog('warn',this)">WARN</button>
<button class="text-xs px-3 py-1 rounded-lg border transition-all" style="border-color:rgba(96,165,250,.2);background:rgba(96,165,250,.1);color:#3B82F6" onclick="fltLog('error',this)">ERROR</button>
</div>
<div id="logC" class="log-c"><p style="color:#64748b">加载中...</p></div>
<div class="flex items-center justify-between mt-2">
<span class="text-xs text-gray-400" id="logCnt">0 条</span>
<label class="flex items-center gap-1 text-xs text-gray-500 cursor-pointer"><input type="checkbox" id="logAS" checked> 自动滚动</label>
</div>
</div>
</div>

</main>
</div>
</div>

<script>
const API='/plugin/napcat-plugin-offline-notify/api';
let C={},S={},logFlt='all';
function $(id){return document.getElementById(id)}
function toast(m,t='info'){const c=$('tc'),d=document.createElement('div');d.className='toast '+t;d.textContent=m;c.appendChild(d);setTimeout(()=>{d.style.opacity='0';setTimeout(()=>d.remove(),300)},3000)}
function tg(el){el.classList.toggle('on')}
function stg(id,v){const e=$(id);if(e){if(v)e.classList.add('on');else e.classList.remove('on')}}
function gtg(id){return $(id)?.classList.contains('on')||false}
function sv(id,v){const e=$(id);if(e)e.value=v}
function gn(id,d){const v=parseInt($(id)?.value);return isNaN(v)?d:v}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
async function af(p,m='GET',b=null){const o={method:m,headers:{'Content-Type':'application/json'}};if(b)o.body=JSON.stringify(b);return(await fetch(API+p,o)).json()}
function go(pg,el){document.querySelectorAll('.pg').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.sb').forEach(s=>s.classList.remove('active'));$('pg-'+pg)?.classList.add('active');el?.classList.add('active');if(pg==='dashboard')updDash();if(pg==='config')loadCfg();if(pg==='logs')loadLogs()}
function toggleTheme(){document.documentElement.classList.toggle('dark')}
async function loadCfg(){try{const r=await af('/config');if(r.success){C=r.data||{};fillCfg();return true}}catch{}toast('加载配置失败');return false}
async function loadStatus(){try{const r=await af('/status');if(r.success){S=r.data||{};if(r.version)$('ver').textContent='v'+r.version;const st=S.status==='online'?'在线':(S.status==='offline'?'离线':'未知');$('sDot').className='w-2 h-2 rounded-full '+(S.status==='online'?'bg-emerald-400':(S.status==='offline'?'bg-red-400':'bg-gray-400'));$('sTxt').textContent=st;return true}}catch{}return false}
function fillCfg(){stg('c-enabled',C.enabled);sv('c-webhook',C.webhookUrl||'');sv('c-interval',C.checkInterval||5);sv('c-retry',C.retryCount||2);sv('c-msg',C.customMessage||'');const m=C.checkMethods||[];$('c-m1').checked=m.includes('kickedOffLine');$('c-m2').checked=m.includes('getGroupList');$('c-m3').checked=m.includes('getRecentContact')}
function collectCfg(){const m=[];if($('c-m1').checked)m.push('kickedOffLine');if($('c-m2').checked)m.push('getGroupList');if($('c-m3').checked)m.push('getRecentContact');return{enabled:gtg('c-enabled'),webhookUrl:$('c-webhook')?.value||'',checkMethods:m,checkInterval:gn('c-interval',5),retryCount:gn('c-retry',2),customMessage:$('c-msg')?.value||''}}
async function doSave(){try{const cfg=collectCfg();const r=await af('/config','POST',cfg);if(r.success){toast('配置已保存','success');await loadCfg();await loadStatus();updDash()}else toast(r.error||'保存失败','error')}catch{toast('保存失败','error')}}
function fmt(t){if(!t)return'未知';const d=new Date(t);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`}
function updDash(){const st=S.status==='online'?'在线':(S.status==='offline'?'离线':'未知');$('d-status').textContent=st;$('d-online').textContent=fmt(S.onlineTime);$('d-notify').textContent=S.lastNotifyTime?fmt(S.lastNotifyTime):'从未';$('d-next').textContent=C.enabled&&S.nextCheckTime?fmt(S.nextCheckTime):'已停用';const m=C.checkMethods||[];$('d-m1').textContent=m.includes('kickedOffLine')?'✅ KickedOffLine':'❌ KickedOffLine';$('d-m2').textContent=m.includes('getGroupList')?'✅ 获取群列表':'❌ 获取群列表';$('d-m3').textContent=m.includes('getRecentContact')?'✅ 获取好友列表':'❌ 获取好友列表';const btn=$('checkBtn');if(btn){btn.disabled=S.checking;btn.style.opacity=S.checking?'0.5':'1';btn.style.cursor=S.checking?'not-allowed':'pointer'}}
async function testNotify(){try{const r=await af('/test','POST');if(r.success){toast('正在测试','info');setTimeout(async()=>{const check=await af('/test-result','GET');if(check.success&&check.data.includes('ok')){toast('已成功推送通知','success')}else{toast('推送失败: '+(check.data||'未知错误'),'error')}},1000)}else toast(r.error||'推送失败','error')}catch{toast('测试失败','error')}}
async function doCheck(){const btn=$('checkBtn');if(btn.disabled)return;btn.disabled=true;btn.style.opacity='0.5';btn.style.cursor='not-allowed';try{const r=await af('/check','POST');if(r.success){S=r.data;await loadStatus();updDash();toast('检测完成','success')}else toast(r.error||'检测失败','error')}catch{toast('检测失败','error')}finally{btn.disabled=false;btn.style.opacity='1';btn.style.cursor='pointer'}}
async function loadLogs(){try{const r=await af('/logs');if(r.success){const logs=r.data||[];const f=logFlt==='all'?logs:logs.filter(l=>l.level===logFlt);$('logCnt').textContent=`${f.length}/${logs.length} 条`;const c=$('logC');if(!f.length){c.innerHTML='<p style="color:#64748b">暂无日志</p>';return}c.innerHTML=f.map(l=>{const t=new Date(l.time),ts=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')} ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}`,lv=l.level.toUpperCase().padEnd(5);return`<div class="log-e log-${l.level}"><span class="lt">${ts}</span> <span class="ll">[${lv}]</span> <span class="lm">${esc(l.msg)}</span></div>`}).join('');if($('logAS')?.checked)c.scrollTop=c.scrollHeight}}catch{$('logC').innerHTML='<p style="color:#ef4444">获取失败</p>'}}
function fltLog(lv,btn){logFlt=lv;btn.parentElement.querySelectorAll('button').forEach(b=>{b.style.background='rgba(96,165,250,.1)';b.style.color='#3B82F6'});btn.style.background='linear-gradient(135deg,#60A5FA,#3B82F6)';btn.style.color='#fff';loadLogs()}
async function clrLogs(){try{await af('/logs/clear','POST');await loadLogs();toast('日志已清除')}catch{toast('清除失败')}}
(async()=>{if(window.matchMedia('(prefers-color-scheme: dark)').matches)document.documentElement.classList.add('dark');await loadCfg();await loadStatus();updDash();setInterval(async()=>{await loadStatus();updDash()},3000)})();
</script>
</body>
</html>
